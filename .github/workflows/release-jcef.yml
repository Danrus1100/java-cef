name: Release patched JCEF binaries

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag. Leave empty to use java-cef-<commit>."
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-22.04
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          tag="${INPUT_RELEASE_TAG}"
          if [ -z "$tag" ]; then
            tag="java-cef-${GITHUB_SHA}"
          fi
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists"
          else
            gh release create "$tag" \
              --target "$GITHUB_SHA" \
              --title "$tag" \
              --notes "Patched JCEF binaries for $GITHUB_SHA"
          fi

  build:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux_amd64
            os: ubuntu-22.04
            cmake_arch: amd64
          - platform: windows_amd64
            os: windows-2022
            cmake_arch: amd64
          - platform: macos_amd64
            os: macos-15-intel
            cmake_arch: x86_64
          - platform: macos_arm64
            os: macos-15
            cmake_arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ cmake ninja-build python3 libgtk2.0-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install ninja coreutils

      - name: Pre-download macOS clang-format
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tools/buildtools/mac
          if [ "${{ matrix.cmake_arch }}" = "arm64" ]; then
            hash_file="tools/buildtools/mac/clang-format.arm64.sha1"
          else
            hash_file="tools/buildtools/mac/clang-format.x64.sha1"
          fi
          hash="$(tr -d '[:space:]' < "$hash_file")"
          curl -fsSL "https://storage.googleapis.com/chromium-clang-format/${hash}" \
            -o tools/buildtools/mac/clang-format
          chmod +x tools/buildtools/mac/clang-format

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja -y

      - name: Build JCEF
        shell: bash
        run: |
          set -euo pipefail
          mkdir jcef_build
          cd jcef_build
          cmake -G "Ninja" -DPROJECT_ARCH=${{ matrix.cmake_arch }} -DCMAKE_BUILD_TYPE=Release ..
          ninja -j4
          mv native/Release "${{ matrix.platform }}"
          tar -czf "${{ matrix.platform }}.tar.gz" "${{ matrix.platform }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.platform }}.tar.gz" > "${{ matrix.platform }}.tar.gz.sha256"
          else
            shasum -a 256 "${{ matrix.platform }}.tar.gz" > "${{ matrix.platform }}.tar.gz.sha256"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            "jcef_build/${{ matrix.platform }}.tar.gz" \
            "jcef_build/${{ matrix.platform }}.tar.gz.sha256" \
            --clobber
